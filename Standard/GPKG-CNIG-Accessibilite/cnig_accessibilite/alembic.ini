[alembic]
script_location = %(here)s/migrations
# Default URL – overridden programmatically by create_gpkg() / upgrade_gpkg()
# or via the GPKG_PATH environment variable
sqlalchemy.url = sqlite:///cnig_accessibilite.gpkg

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
